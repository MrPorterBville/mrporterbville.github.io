<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Scoreboard & Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; text-align: center; padding: 20px; }
        
        .setup-box { 
            background: #34495e; padding: 20px; border-radius: 15px; 
            max-width: 600px; margin: 0 auto 20px auto; border-bottom: 4px solid #2c3e50;
        }

        .controls { margin-bottom: 30px; }
        
        input { 
            padding: 12px; font-size: 16px; border-radius: 8px; border: none; 
            width: 60%; margin-bottom: 10px; outline: none;
        }

        button { 
            padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; 
            border: none; border-radius: 8px; transition: 0.2s; margin: 5px;
        }
        
        #setTeams { background: #3498db; color: white; }
        #setTeams:hover { background: #2980b9; }

        #lockToggle { background: #27ae60; color: white; width: 250px; font-size: 20px; padding: 18px; }
        #resetBtn { background: #95a5a6; color: white; font-size: 20px; padding: 18px; }
        
        .winner-box { font-size: 42px; color: #f1c40f; margin: 20px 0; min-height: 60px; }
        
        ul { list-style: none; padding: 0; max-width: 500px; margin: 0 auto; }
        li { 
            background: #34495e; margin: 10px; padding: 15px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 22px;
            border-left: 5px solid #7f8c8d;
        }
        li:first-child { border-left: 5px solid #f1c40f; background: #4b6584; transform: scale(1.05); }
        
        .team-label { font-size: 14px; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; color: #bdc3c7; }
        .rank { font-weight: bold; color: #f1c40f; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="setup-box">
        <h3>Game Setup</h3>
        <input type="text" id="teamInput" placeholder="Team A, Team B, Team C">
        <button id="setTeams">Update Team Names</button>
        <p style="font-size: 12px; color: #bdc3c7;">Separate team names with commas</p>
    </div>

    <div class="controls">
        <button id="lockToggle">UNLOCK BUZZERS</button>
        <button id="resetBtn">RESET ROUND</button>
    </div>

    <div id="winner-display" class="winner-box">Waiting for buzzes...</div>
    
    <ul id="buzzer-list"></ul>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- PASTE YOUR CONFIG BELOW ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        // -------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const lockRef = ref(db, 'settings/locked');
        const teamRef = ref(db, 'settings/teams');
        const buzzRef = ref(db, 'buzzes/');
        
        let isLocked = true;

        // 1. Update Team Names in Firebase
        document.getElementById('setTeams').onclick = () => {
            const teamNames = document.getElementById('teamInput').value;
            if(!teamNames) return alert("Enter some team names first!");
            set(teamRef, teamNames);
            alert("Teams sent to students!");
        };

        // 2. Toggle Lock/Unlock
        document.getElementById('lockToggle').onclick = () => {
            set(lockRef, !isLocked);
        };

        // 3. Reset Round
        document.getElementById('resetBtn').onclick = () => {
            remove(buzzRef);
            set(lockRef, true);
        };

        // 4. Sync UI with Lock Status
        onValue(lockRef, (snapshot) => {
            const val = snapshot.val();
            isLocked = (val === null) ? true : val; // Default to locked if null
            const btn = document.getElementById('lockToggle');
            btn.innerText = isLocked ? "UNLOCK BUZZERS" : "LOCK BUZZERS";
            btn.style.background = isLocked ? "#27ae60" : "#e74c3c";
        });

        // 5. Watch for incoming Buzzes
        onValue(buzzRef, (snapshot) => {
            const data = snapshot.val();
            const listElement = document.getElementById('buzzer-list');
            const winnerDisplay = document.getElementById('winner-display');
            listElement.innerHTML = "";

            if (data) {
                // Sort by the server timestamp
                const sorted = Object.entries(data).sort((a, b) => a[1].timestamp - b[1].timestamp);
                
                winnerDisplay.innerHTML = `Winner: <span style="color:white">${sorted[0][0]}</span>`;
                
                sorted.forEach(([name, info], index) => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div><span class="rank">#${index + 1}</span> ${name}</div>
                        <div class="team-label">${info.team || 'No Team'}</div>
                    `;
                    listElement.appendChild(li);
                });
            } else {
                winnerDisplay.innerText = "Waiting for buzzes...";
            }
        });
    </script>
</body>
</html>
