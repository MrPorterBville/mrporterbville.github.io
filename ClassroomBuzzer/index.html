<!DOCTYPE html>
<html>
<head>
    <title>Classroom Buzzer - Student</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        #buzzer { 
            width: 200px; height: 200px; background: red; color: white; 
            border-radius: 50%; border: 10px solid #800; font-size: 24px; 
            cursor: pointer; box-shadow: 0 9px #999; margin-top: 20px;
        }
        #buzzer:active { background-color: #d00; box-shadow: 0 5px #666; transform: translateY(4px); }
        input { padding: 10px; font-size: 18px; width: 80%; max-width: 300px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Classroom Buzzer</h1>
    <input type="text" id="username" placeholder="Enter your name..." required><br>
    <button id="buzzer">BUZZ!</button>
    <p id="status"></p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE YOUR FIREBASE CONFIG BLOCK BELOW
        const firebaseConfig = {
        apiKey: "AIzaSyCr_AmYU0vZtpi-QS9Mu-RfFmSMrhISJTk",
        authDomain: "classroombuzzer-cfc2e.firebaseapp.com",
        projectId: "classroombuzzer-cfc2e",
        storageBucket: "classroombuzzer-cfc2e.firebasestorage.app",
        messagingSenderId: "95871964596",
        appId: "1:95871964596:web:fccd25f2eb321217ac0ee1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('buzzer').onclick = function() {
            const name = document.getElementById('username').value;
            if (!name) { alert("Please enter your name!"); return; }

            set(ref(db, 'buzzes/' + name), {
                timestamp: serverTimestamp(),
                timeString: new Date().toLocaleTimeString()
            }).then(() => {
                document.getElementById('status').innerText = "Sent! Check the teacher's screen.";
            });
        };
    </script>
</body>
</html>
